spring:
  application:
    name: krypton-backend
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway es dueño del schema; Hibernate solo valida
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true                 # aplica las migraciones pendientes al arrancar

# Configuración de la app (JWT). El secreto real va por env JWT_SECRET en prod.
# El default es SOLO para desarrollo (≥32 bytes que exige HS256). NO usar en prod.
app:
  jwt:
    secret: ${JWT_SECRET:dev-only-change-me-krypton-secret-key-1234567890}
    expiration: 86400000          # 24h en milisegundos

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/krypton
    username: krypton
    password: krypton
