<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;background:var(--surface-page);padding:24px;font-family:var(--font-sans)}
.wrap{display:flex;gap:20px;align-items:flex-start}
.col{display:flex;flex-direction:column;gap:12px}
.row{display:flex;gap:8px;flex-wrap:wrap}</style></head>
<body><div id="root"></div>
<script type="text/babel">
const { ProductCard, Badge, Rating, Card } = window.KryptonDesignSystem_457463;
function Demo(){
  return (<div className="wrap">
    <div style={{width:230}}>
      <ProductCard name="Audífonos Krypton Pulse X Bluetooth" category="Audio"
        price={349.9} oldPrice={429.9} badge={{label:"-20%",tone:"sale"}}
        rating={4.5} ratingCount={128} onAdd={()=>{}} onClick={()=>{}} />
    </div>
    <div className="col">
      <Card padding={16}>
        <div style={{fontSize:13,fontWeight:600,color:'var(--text-strong)',marginBottom:10}}>Badges</div>
        <div className="row">
          <Badge tone="sale" solid>-20%</Badge>
          <Badge tone="brand">Nuevo</Badge>
          <Badge tone="success">En stock</Badge>
          <Badge tone="warn">Pocas unidades</Badge>
          <Badge tone="cta" solid>Oferta</Badge>
          <Badge tone="danger">Agotado</Badge>
        </div>
      </Card>
      <Card padding={16}>
        <div style={{fontSize:13,fontWeight:600,color:'var(--text-strong)',marginBottom:10}}>Rating</div>
        <div className="col">
          <Rating value={5} count={342} showValue />
          <Rating value={4} count={128} showValue />
          <Rating value={3} count={12} showValue />
        </div>
      </Card>
      <Card interactive padding={16}>
        <div style={{fontSize:13,color:'var(--text-body)'}}>Card interactiva — pasa el cursor para ver la elevación.</div>
      </Card>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
setTimeout(()=>window.lucide&&lucide.createIcons(),60);
</script></body></html>
