<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;background:var(--surface-card);padding:24px;font-family:var(--font-sans)}
.row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.lbl{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);width:100%;margin-bottom:-6px}</style></head>
<body><div id="root"></div>
<script type="text/babel">
const { Button, IconButton } = window.KryptonDesignSystem_457463;
function Demo(){
  return (<div>
    <div className="row"><span className="lbl">Variants</span>
      <Button variant="cta">Comprar ahora</Button>
      <Button variant="primary">Agregar al carrito</Button>
      <Button variant="secondary">Ver detalle</Button>
      <Button variant="ghost">Cancelar</Button>
      <Button variant="danger">Eliminar</Button>
    </div>
    <div className="row"><span className="lbl">Sizes & state</span>
      <Button size="sm">Small</Button>
      <Button size="md">Medium</Button>
      <Button size="lg" variant="cta">Large</Button>
      <Button disabled>Disabled</Button>
    </div>
    <div className="row"><span className="lbl">IconButton</span>
      <IconButton icon="shopping-cart" label="Carrito" variant="cta" />
      <IconButton icon="search" label="Buscar" variant="solid" />
      <IconButton icon="heart" label="Favorito" variant="soft" round />
      <IconButton icon="user" label="Cuenta" variant="outline" />
      <IconButton icon="chevron-right" label="Siguiente" variant="ghost" />
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
setTimeout(()=>window.lucide&&lucide.createIcons(),60);
</script></body></html>
