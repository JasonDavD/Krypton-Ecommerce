<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Krypton — Inicia sesión o regístrate</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; background: var(--surface-page); }
</style>
</head>
<body>
<div id="root"></div>
<script src="data.js"></script>
<script type="text/babel" src="Navbar.jsx"></script>
<script type="text/babel" src="Login.jsx"></script>
<script type="text/babel" data-presets="react">
  function KrAuthView() {
    const [route, setRoute] = React.useState({ name: "login" });
    const [user, setUser] = React.useState(null);
    React.useEffect(() => { window.lucide && lucide.createIcons(); });
    return (
      <div>
        <KrNavbar
          route={route}
          onNavigate={setRoute}
          cartCount={0}
          query=""
          onQuery={() => {}}
          onSearch={() => {}}
          user={user}
          onLogout={() => setUser(null)}
        />
        <KrLogin
          onLogin={(email) => setUser({ email })}
          onNavigate={setRoute}
        />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<KrAuthView />);
  setTimeout(() => window.lucide && lucide.createIcons(), 120);
</script>
</body>
</html>
