<!-- @dsCard group="Spacing" viewport="700x160" name="Radii & shadows" subtitle="Corner radii and navy-tinted elevation" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);padding:22px 24px;background:var(--surface-page);display:flex;gap:26px;align-items:center;flex-wrap:wrap}
  .box{width:78px;height:78px;background:var(--surface-card);display:flex;align-items:flex-end;justify-content:center;padding:6px;font-size:10px;color:var(--text-muted)}
  .group{display:flex;gap:14px}
</style></head>
<body>
  <div class="group">
    <div class="box" style="border-radius:4px;border:1px solid var(--border-default)">xs 4</div>
    <div class="box" style="border-radius:8px;border:1px solid var(--border-default)">sm 8</div>
    <div class="box" style="border-radius:12px;border:1px solid var(--border-default)">md 12</div>
    <div class="box" style="border-radius:18px;border:1px solid var(--border-default)">lg 18</div>
    <div class="box" style="border-radius:999px;border:1px solid var(--border-default)">pill</div>
  </div>
  <div class="group">
    <div class="box" style="border-radius:12px;box-shadow:var(--shadow-sm)">sm</div>
    <div class="box" style="border-radius:12px;box-shadow:var(--shadow-md)">md</div>
    <div class="box" style="border-radius:12px;box-shadow:var(--shadow-lg)">lg</div>
    <div class="box" style="border-radius:12px;box-shadow:var(--shadow-cta)">cta</div>
  </div>
</body></html>
