<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card)}
  .wrap{display:grid;grid-template-columns:1fr 1fr;gap:0}
  .cell{display:flex;align-items:center;justify-content:center;height:100px;padding:16px}
  .navy{background:var(--kr-navy-800)}
  .blue{background:var(--kr-blue-600)}
  .orange{background:var(--kr-orange-500)}
  img{height:34px;display:block}
</style></head>
<body>
  <div class="wrap">
    <div class="cell"><img src="../assets/logo/Krypton-navy.svg"></div>
    <div class="cell navy"><img src="../assets/logo/Krypton-white.svg"></div>
    <div class="cell blue"><img src="../assets/logo/Krypton-white.svg"></div>
    <div class="cell orange"><img src="../assets/logo/Krypton-white.svg"></div>
  </div>
</body></html>
