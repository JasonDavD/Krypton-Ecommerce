<!-- @dsCard group="Colors" viewport="700x130" name="Semantic / feedback" subtitle="Success · Warning · Danger · Info" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);padding:18px;background:var(--surface-card)}
  .row{display:flex;gap:12px}
  .pill{flex:1;display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:10px}
  .dot{width:18px;height:18px;border-radius:50%}
  .pill b{font-size:13px;font-weight:600}
  .pill span{font-size:11px;display:block;color:var(--text-muted)}
</style></head>
<body>
  <div class="row">
    <div class="pill" style="background:var(--kr-success-bg)"><span class="dot" style="background:var(--kr-success)"></span><div><b>Success</b><span>#1F9D57</span></div></div>
    <div class="pill" style="background:var(--kr-warning-bg)"><span class="dot" style="background:var(--kr-warning)"></span><div><b>Warning</b><span>#F2B809</span></div></div>
    <div class="pill" style="background:var(--kr-danger-bg)"><span class="dot" style="background:var(--kr-danger)"></span><div><b>Danger</b><span>#E23A2E</span></div></div>
    <div class="pill" style="background:var(--kr-info-bg)"><span class="dot" style="background:var(--kr-info)"></span><div><b>Info</b><span>#1A7DD7</span></div></div>
  </div>
</body></html>
