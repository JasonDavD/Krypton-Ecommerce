<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals" subtitle="Cool, navy-tinted gray scale" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);padding:18px;background:var(--surface-card)}
  .row{display:flex;gap:8px}
  .sw{flex:1;text-align:center}
  .chip{height:60px;border-radius:6px}
  .sw b{display:block;font-size:10px;margin-top:6px;color:var(--text-body)}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--kr-gray-50);border:1px solid var(--border-subtle)"></div><b>50</b></div>
    <div class="sw"><div class="chip" style="background:var(--kr-gray-100)"></div><b>100</b></div>
    <div class="sw"><div class="chip" style="background:var(--kr-gray-200)"></div><b>200</b></div>
    <div class="sw"><div class="chip" style="background:var(--kr-gray-300)"></div><b>300</b></div>
    <div class="sw"><div class="chip" style="background:var(--kr-gray-400)"></div><b>400</b></div>
    <div class="sw"><div class="chip" style="background:var(--kr-gray-500)"></div><b>500</b></div>
    <div class="sw"><div class="chip" style="background:var(--kr-gray-600)"></div><b>600</b></div>
    <div class="sw"><div class="chip" style="background:var(--kr-gray-700)"></div><b>700</b></div>
    <div class="sw"><div class="chip" style="background:var(--kr-gray-900)"></div><b>900</b></div>
  </div>
</body></html>
