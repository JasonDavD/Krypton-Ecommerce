<!-- @dsCard group="Colors" viewport="700x150" name="Blue ramp (primary)" subtitle="Primary action scale" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);padding:18px;background:var(--surface-card)}
  .row{display:flex;gap:10px}
  .sw{flex:1;text-align:center}
  .chip{height:64px;border-radius:8px;box-shadow:var(--shadow-xs)}
  .sw b{display:block;font-size:11px;margin-top:6px;color:var(--text-body)}
  .sw span{font-size:10px;color:var(--text-muted);font-variant-numeric:tabular-nums}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--kr-navy-800)"></div><b>navy-800</b><span>#03275A</span></div>
    <div class="sw"><div class="chip" style="background:var(--kr-blue-700)"></div><b>blue-700</b><span>#1560B0</span></div>
    <div class="sw"><div class="chip" style="background:var(--kr-blue-600)"></div><b>blue-600</b><span>#1A7DD7</span></div>
    <div class="sw"><div class="chip" style="background:var(--kr-blue-500)"></div><b>blue-500</b><span>#3A92E3</span></div>
    <div class="sw"><div class="chip" style="background:var(--kr-blue-100)"></div><b>blue-100</b><span>#D7EBFB</span></div>
    <div class="sw"><div class="chip" style="background:var(--kr-blue-50);border:1px solid var(--border-subtle)"></div><b>blue-50</b><span>#EEF6FE</span></div>
  </div>
</body></html>
