<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans)}
  .row{display:flex}
  .sw{flex:1;height:120px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#fff}
  .sw b{font-weight:700;font-size:13px}
  .sw span{font-size:11px;opacity:.85;font-variant-numeric:tabular-nums}
  .dark span,.dark b{color:#fff}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:#03275A"><b>Navy</b><span>#03275A</span></div>
    <div class="sw" style="background:#1A7DD7"><b>Blue</b><span>#1A7DD7</span></div>
    <div class="sw" style="background:#F2B809;color:#11192b"><b>Yellow</b><span>#F2B809</span></div>
    <div class="sw" style="background:#F37402"><b>Orange</b><span>#F37402</span></div>
    <div class="sw" style="background:#F34605"><b>Red-orange</b><span>#F34605</span></div>
  </div>
</body></html>
