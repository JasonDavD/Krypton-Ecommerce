<!-- @dsCard group="Colors" viewport="700x150" name="Warm ramp (energy/CTA)" subtitle="Yellow · Orange · Red-orange tints" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);padding:18px;background:var(--surface-card)}
  .row{display:flex;gap:10px}
  .sw{flex:1;text-align:center}
  .chip{height:64px;border-radius:8px;box-shadow:var(--shadow-xs)}
  .sw b{display:block;font-size:11px;margin-top:6px;color:var(--text-body)}
  .sw span{font-size:10px;color:var(--text-muted);font-variant-numeric:tabular-nums}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--kr-yellow-500)"></div><b>yellow-500</b><span>#F2B809</span></div>
    <div class="sw"><div class="chip" style="background:var(--kr-orange-500)"></div><b>orange-500</b><span>#F37402</span></div>
    <div class="sw"><div class="chip" style="background:var(--kr-orange-600)"></div><b>orange-600</b><span>#D96402</span></div>
    <div class="sw"><div class="chip" style="background:var(--kr-redorange-500)"></div><b>redorange-500</b><span>#F34605</span></div>
    <div class="sw"><div class="chip" style="background:var(--kr-redorange-600)"></div><b>redorange-600</b><span>#D83A04</span></div>
    <div class="sw"><div class="chip" style="background:var(--kr-orange-100)"></div><b>orange-100</b><span>#FDE3CC</span></div>
  </div>
</body></html>
