<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base — space-1 → space-8" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);padding:20px 24px;background:var(--surface-card)}
  .row{display:flex;align-items:flex-end;gap:14px}
  .item{text-align:center}
  .bar{background:var(--kr-blue-600);border-radius:3px;width:28px}
  .item b{display:block;font-size:10px;margin-top:6px;color:var(--text-body)}
  .item span{font-size:9px;color:var(--text-muted)}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><b>1</b><span>4</span></div>
    <div class="item"><div class="bar" style="height:8px"></div><b>2</b><span>8</span></div>
    <div class="item"><div class="bar" style="height:12px"></div><b>3</b><span>12</span></div>
    <div class="item"><div class="bar" style="height:16px"></div><b>4</b><span>16</span></div>
    <div class="item"><div class="bar" style="height:24px"></div><b>5</b><span>24</span></div>
    <div class="item"><div class="bar" style="height:32px"></div><b>6</b><span>32</span></div>
    <div class="item"><div class="bar" style="height:48px"></div><b>7</b><span>48</span></div>
    <div class="item"><div class="bar" style="height:64px"></div><b>8</b><span>64</span></div>
  </div>
</body></html>
