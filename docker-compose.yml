services:
  db:
    image: postgres:16
    container_name: krypton-db
    environment:
      POSTGRES_DB: krypton
      POSTGRES_USER: krypton
      POSTGRES_PASSWORD: krypton
    ports:
      - "5432:5432"
    volumes:
      - krypton_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U krypton -d krypton"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  krypton_pgdata:
